name: Frontend CI

on:
  workflow_call:
    inputs:
      aws-region:
        description: "AWS region"
        required: true
        type: string
      s3-bucket:
        description: "S3 bucket name for static assets"
        required: true
        type: string
      cloudfront-distribution-id:
        description: "CloudFront distribution ID"
        required: true
        type: string
      role-to-assume:
        description: "IAM role ARN for OIDC"
        required: true
        type: string
      deploy:
        description: "Whether to deploy (true on push to main)"
        required: false
        type: boolean
        default: false

jobs:
  build-and-lint:
    name: Build and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        if: ${{ inputs.deploy }}
        uses: actions/upload-artifact@v4
        with:
          name: static-assets
          path: out/

  deploy:
    name: Deploy
    needs: build-and-lint
    if: ${{ inputs.deploy }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: static-assets
          path: out/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: ${{ inputs.aws-region }}

      - name: Sync to S3
        run: aws s3 sync out/ s3://${{ inputs.s3-bucket }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ inputs.cloudfront-distribution-id }} \
            --paths "/*"
